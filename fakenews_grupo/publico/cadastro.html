<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | Portal Fake News</title>
  <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand" href="../index.html">Portal <span>Fake News</span></a>
      <nav class="nav">
        <a href="../index.html">Inicio</a>
        <a href="noticias.html">Noticias</a>
        <a href="login.html">Login</a>
        <a class="active" href="cadastro.html">Cadastro</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <section class="panel">
        <h1>Criar conta</h1>
        <p class="note">Formulario simples para cadastro do usuario leitor.</p>
        <form class="form-grid" action="login.html">
          <div class="form-row">
            <div class="field">
              <label for="nome">Nome</label>
              <input id="nome" name="nome" type="text" placeholder="Nome completo">
            </div>
            <div class="field">
              <label for="email">E-mail</label>
              <input id="email" name="email" type="email" placeholder="nome@email.com">
            </div>
          </div>
          <div class="form-row">
            <div class="field">
              <label for="senha">Senha</label>
              <input id="senha" name="senha" type="password" placeholder="Senha">
            </div>
            <div class="field">
              <label for="cidade">Cidade</label>
              <input id="cidade" name="cidade" type="text" placeholder="Sua cidade">
            </div>
          </div>
          <div class="field">
            <label for="bio">Bio</label>
            <textarea id="bio" name="bio" placeholder="Fale rapidamente sobre voce"></textarea>
          </div>
          <div class="actions">
            <button class="button" type="submit">Cadastrar</button>
            <a class="button secondary" href="login.html">Voltar para login</a>
          </div>
        </form>
      </section>
    </div>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div>
        <strong>Portal Fake News</strong>
        <p class="note">Projeto academico em HTML e CSS.</p>
      </div>
      <div>
        <strong>Paginas</strong>
        <p><a href="login.html">Login</a></p>
        <p><a href="noticias.html">Noticias</a></p>
      </div>
      <div>
        <strong>Areas</strong>
        <p><a href="../leitor/feed.html">Leitor</a></p>
        <p><a href="../superadmin/dashboard.html">Superadmin</a></p>
      </div>
    </div>
  </footer>
</body>
</html>
