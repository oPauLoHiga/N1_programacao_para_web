<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar | Fake News</title>
  <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand" href="../index.html"><img src="../assets/images/logo.png" alt="Fake News"></a>
      <nav class="nav" aria-label="Navegação principal">
        <a href="../index.html">Início</a>
        <a href="noticias.html">Notícias</a>
        <a href="../leitor/feed.html">Leitor</a>
        <a href="../autor/noticias.html">Autor</a>
        <a href="../superadmin/dashboard.html">Superadmin</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section section-alt">
      <div class="container columns">
        <div>
          <span class="eyebrow">Acesso</span>
          <h1>Entre para acompanhar suas notícias</h1>
          <p class="lead">Use seu e-mail para continuar a leitura, comentar e salvar matérias.</p>
        </div>
        <form class="panel form-grid" action="../leitor/feed.html">
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="nome@email.com">
          </div>
          <div class="field">
            <label for="senha">Senha</label>
            <input id="senha" name="senha" type="password" placeholder="Sua senha">
          </div>
          <button class="button" type="submit">Entrar</button>
          <p class="hint">Ainda não tem conta? <a class="mini-link" href="cadastro.html">Criar conta</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <p>Fake News</p>
      <p><a href="cadastro.html">Criar conta</a></p>
      <p><a href="../index.html">Início</a></p>
    </div>
  </footer>
</body>
</html>
