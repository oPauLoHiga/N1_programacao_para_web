<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Criar conta | Fake News</title>
  <link rel="stylesheet" href="../assets/css/estilo.css">
</head>
<body>
  <header class="site-header">
    <div class="container topbar">
      <a class="brand" href="../index.html"><img src="../assets/images/logo.png" alt="Fake News"></a>
      <nav class="nav" aria-label="Navegação principal">
        <a href="../index.html">Início</a>
        <a href="noticias.html">Notícias</a>
        <a href="../leitor/feed.html">Leitor</a>
        <a href="../autor/noticias.html">Autor</a>
        <a href="../superadmin/dashboard.html">Superadmin</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="container columns">
        <div>
          <span class="eyebrow">Cadastro</span>
          <h1>Crie sua conta de leitor</h1>
          <p class="lead">Receba notícias por interesse, salve matérias e participe das conversas.</p>
        </div>
        <form class="panel form-grid" action="../leitor/feed.html">
          <div class="form-row">
            <div class="field">
              <label for="nome">Nome completo</label>
              <input id="nome" name="nome" type="text" placeholder="Seu nome">
            </div>
            <div class="field">
              <label for="cidade">Cidade</label>
              <input id="cidade" name="cidade" type="text" placeholder="Ex.: Brasília">
            </div>
          </div>
          <div class="field">
            <label for="email">E-mail</label>
            <input id="email" name="email" type="email" placeholder="nome@email.com">
          </div>
          <div class="form-row">
            <div class="field">
              <label for="senha">Senha</label>
              <input id="senha" name="senha" type="password" placeholder="Crie uma senha">
            </div>
            <div class="field">
              <label for="perfil">Perfil</label>
              <select id="perfil" name="perfil">
                <option>Leitor</option>
                <option>Autor</option>
              </select>
            </div>
          </div>
          <fieldset class="choice-group">
            <legend>Interesses</legend>
            <div class="choice-grid">
              <label class="choice"><input type="checkbox" name="tags" value="cidade"> Cidade</label>
              <label class="choice"><input type="checkbox" name="tags" value="saude"> Saúde</label>
              <label class="choice"><input type="checkbox" name="tags" value="tecnologia"> Tecnologia</label>
            </div>
          </fieldset>
          <button class="button" type="submit">Criar conta</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <p>Fake News</p>
      <p><a href="login.html">Entrar</a></p>
      <p><a href="../index.html">Início</a></p>
    </div>
  </footer>
</body>
</html>
